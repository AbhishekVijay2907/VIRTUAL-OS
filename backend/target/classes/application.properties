# Server Configuration
server.port=8080

# Database Configuration (MongoDB)
# Default is local, but can be overridden with environment variables (e.g. SPRING_DATA_MONGODB_URI)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/virtualos}

# JWT Security Settings
# Make sure the secret is sufficiently long for HMAC-256
virtualos.jwt.secret=${JWT_SECRET:VirtualOSSuperSecretKeyMustBeLongEnoughForHMAC256Algorithms32BytesLong}
# 1 day expiration in milliseconds (86400000 ms)
virtualos.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Spring Boot Logging
logging.level.org.springframework.web=INFO
logging.level.com.virtualos=DEBUG

# Enable detailed error responses
server.error.include-message=always
server.error.include-binding-errors=always
